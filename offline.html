<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StudyOS — Offline</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #080b14;
      color: #f0f4ff;
      font-family: 'DM Sans', system-ui, sans-serif;
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 20px;
    }
    .card {
      background: rgba(255,255,255,0.045);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 24px; padding: 48px 40px;
      max-width: 420px; width: 100%;
    }
    .icon { font-size: 3.5rem; margin-bottom: 20px; }
    h1 { font-size: 1.6rem; font-weight: 800; margin-bottom: 10px; color: #00ffb2; }
    p { font-size: 0.9rem; color: #8892b0; line-height: 1.6; margin-bottom: 28px; }
    button {
      background: linear-gradient(135deg, #00ffb2, #00c890);
      color: #000; font-weight: 700; font-size: 0.9rem;
      border: none; border-radius: 12px; padding: 13px 28px;
      cursor: pointer; transition: opacity .2s;
    }
    button:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>StudyOS can't reach the network right now. Your local tasks and progress are still saved. Reconnect to sync any changes.</p>
    <button onclick="location.reload()">↻ Try Again</button>
  </div>
</body>
</html>
